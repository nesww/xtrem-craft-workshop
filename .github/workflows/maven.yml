name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      working-directory: java
      run: mvn -B package

  quality:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Lint
      working-directory: java
      run: |
        mvn -B checkstyle:checkstyle \
          -Dcheckstyle.config.location=google_checks.xml \
          -Dcheckstyle.violationSeverity=warning

    - name: Run tests with coverage
      working-directory: java
      run: mvn -B verify

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: java/target/surefire-reports/

    - name: Upload JaCoCo coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-coverage-report
        path: java/target/site/jacoco/

  mutation:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run PIT mutation testing
      working-directory: java
      run: mvn -B org.pitest:pitest-maven:mutationCoverage

    - name: Upload PIT mutation report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pitest-mutation-report
        path: java/target/pit-reports/
